name: Render Keep Alive

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
      - name: Ping Render backend with retry
        run: |
          URL="https://wavenet-backend-1.onrender.com"
          ATTEMPTS=5
          DELAY=10

          for i in $(seq 1 $ATTEMPTS); do
            echo "Attempt $i..."

            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL" || echo "000")

            if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 400 ]; then
              echo "Backend is UP (status $STATUS)"
              exit 0
            fi

            echo "Failed (status $STATUS), retrying in $DELAY seconds..."
            sleep $DELAY
          done

          echo "Backend did not respond after $ATTEMPTS attempts."
          exit 1
